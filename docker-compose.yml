version: '3.8'

networks:
  fuzeinfra:
    external: true
    name: fuzeinfra_default

services:
  # FuzeKeys Backend API
  fuzekeys-api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: fuzekeys-api
    environment:
      - DATABASE_URL=postgresql://fuzekeys_user:fuzekeys_password@shared-postgres:5432/fuzekeys
      - DATABASE_URL_ASYNC=postgresql+asyncpg://fuzekeys_user:fuzekeys_password@shared-postgres:5432/fuzekeys
      - REDIS_URL=redis://shared-redis:6379
      - SECRET_KEY=fuzekeys-production-secret-change-this-in-production
      - MASTER_KEY_SALT=fuzekeys-production-salt-change-this-in-production
      - ENVIRONMENT=production
      - PYTHONPATH=/app
      - BACKEND_PORT=${BACKEND_PORT:-8002}
    ports:
      - "${BACKEND_PORT:-8002}:8002"
    networks:
      - fuzeinfra
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # FuzeKeys Frontend (React)
  fuzekeys-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fuzekeys-frontend
    environment:
      - REACT_APP_API_URL=http://fuzekeys.dev.local/api
      - NODE_ENV=production
      - FRONTEND_PORT=${FRONTEND_PORT:-3001}
    depends_on:
      - fuzekeys-api
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    networks:
      - fuzeinfra
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3 