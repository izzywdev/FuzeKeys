# Production values for the FuzeKeys workload on the shared Contabo k3s cluster.
# This is the ArgoCD-applied overlay (deploy/argocd/applications/fuzekeys-platform.yaml).
#
# Key points:
#   - ingress.className: traefik behind the shared Cloudflare Tunnel; CF
#     terminates TLS at the edge -> NO cert-manager, NO in-cluster TLS block.
#   - Hosts: keys.prod.fuzefront.com (frontend) / api.keys.prod.fuzefront.com
#     (backend) — CNAME'd to the tunnel in deploy/terraform/cloudflare-dns.tf
#     (applied by FuzeInfra, not from here).
#   - Secrets come from the `fuzekeys-secrets` SealedSecret (never committed raw).
#   - MVP gates: backend + frontend + migrate ON; the whole pii-tokenizer stack
#     OFF (see FOLLOW-UP note in values.yaml).
#   - Replicas sized for a single 4 vCPU / 8 GB VPS.

global:
  environment: prod
  imagePullPolicy: IfNotPresent
  imagePullSecrets:
    - name: ghcr-pull-secret
  # App pods target the workload node (label set by the deploy/terraform request).
  nodeRole: workload

# FuzeInfra is co-located in this k3s cluster (fuzeinfra namespace).
# useNamespacedDns: true resolves to fuzeinfra-<svc>.fuzeinfra.svc.cluster.local
fuzeinfra:
  namespace: fuzeinfra
  useNamespacedDns: true
  postgres:
    database: fuzekeys

config:
  logLevel: INFO
  environment: production
  apiBaseUrl: "https://api.keys.prod.fuzefront.com"

# Secrets come from the SealedSecret generated by seal-secrets.yml (Argo-synced
# via deploy/argocd/sealed/). NEVER committed raw.
secrets:
  existingSecret: fuzekeys-secrets

# ---- MVP: backend + frontend + migrate ON --------------------------------
backend:
  enabled: true
  replicas: 2
  resources:
    requests: { cpu: 200m, memory: 384Mi }
    limits: { cpu: "1", memory: 768Mi }

migrate:
  enabled: true

frontend:
  enabled: true
  replicas: 2
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 250m, memory: 256Mi }

persistence:
  logs:
    enabled: true
    storageClass: local-path
    accessMode: ReadWriteOnce
    size: 2Gi
  data:
    enabled: true
    storageClass: local-path
    accessMode: ReadWriteOnce
    size: 5Gi

ingress:
  enabled: true
  # Traefik behind the Cloudflare Tunnel. CF terminates TLS at the edge and the
  # cluster is HTTP-only — no cert-manager, no in-cluster TLS.
  className: traefik
  tls:
    enabled: false
  hosts:
    - host: keys.prod.fuzefront.com
      service: frontend
      port: 80
      path: /
    - host: api.keys.prod.fuzefront.com
      service: backend
      port: 8002
      path: /

# ---- PII-TOKENIZER STACK: OFF for MVP -------------------------------------
# FOLLOW-UP: enable after Vault-in-k8s auto-unseal design + security review.
# Ollama stays OFF regardless (GPU/heavy).
tokenizer:
  enabled: false
vaultBootstrap:
  enabled: false
presidio:
  enabled: false
litellm:
  enabled: false
vault:
  enabled: false
  persistence:
    storageClass: local-path
ollama:
  enabled: false
  persistence:
    storageClass: local-path
tokenizerRedis:
  enabled: false
  persistence:
    storageClass: local-path
