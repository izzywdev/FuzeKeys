# Default values for the FuzeKeys platform chart.
# Override per-environment via `-f values-<env>.yaml` (values-contabo.yaml is the
# ArgoCD-applied prod overlay).

# -----------------------------------------------------------------------------
# Global / shared settings
# -----------------------------------------------------------------------------
global:
  # Logical environment name; surfaced as ENVIRONMENT / app labels.
  environment: production
  # Image registry + repo prefix. The image helper composes
  # <imageRegistry>/<repository>:<tag>, so per-component `image.repository`
  # overrides MUST be a BARE path (e.g. "izzywdev/fuzekeys/backend") with NO
  # registry host — otherwise the registry is prefixed twice.
  imageRegistry: ghcr.io
  imageRepository: izzywdev/fuzekeys
  imagePullPolicy: IfNotPresent
  # Pull secret name(s). The SealedSecret `ghcr-pull-secret` provides the real
  # dockerconfigjson (see deploy/argocd/sealed/). Overridden in values-contabo.
  imagePullSecrets: []
  #  - name: ghcr-pull-secret
  # Node affinity target. On the shared cluster, app pods target nodes labelled
  # node-role=workload (the label deploy/terraform node requests set with
  # role=workload). Empty = no affinity (local/kind).
  nodeRole: ""

nameOverride: ""
fullnameOverride: ""

# -----------------------------------------------------------------------------
# FuzeInfra connection contract (one-way dependency: FuzeKeys -> FuzeInfra).
#
# FuzeInfra is SHARED infrastructure (Postgres/Redis/...) owned by another team.
# FuzeKeys is a CONSUMER: the ONLY thing it assumes about FuzeInfra is its
# published Service contract — stable in-cluster Services named `fuzeinfra-<svc>`
# reachable at `fuzeinfra-<svc>.<namespace>.svc.cluster.local`.
#
# This block holds ONLY contract inputs (where to reach FuzeInfra) — never
# credentials. Credentials are FuzeKeys-owned and live in `secrets:` below (and
# in real clusters come from a SealedSecret); the connection URLs are composed
# in the Secret from those creds + this host/port contract.
#
#  - `namespace`        : the namespace FuzeInfra publishes its Services into.
#  - `useNamespacedDns` : true  -> build the in-cluster FQDN
#                                  `<host>.<namespace>.svc.cluster.local` (the
#                                  published contract; the main path).
#                         false -> compose-bridge FALLBACK: use raw `host` values
#                                  verbatim (docker-compose / out-of-cluster).
# -----------------------------------------------------------------------------
fuzeinfra:
  namespace: fuzeinfra
  useNamespacedDns: true
  postgres:
    host: fuzeinfra-postgres
    port: 5432
    # Postgres database FuzeKeys connects to — FuzeKeys-owned, provisioned by
    # FuzeInfra's DB onboarding (role + database `fuzekeys`).
    database: fuzekeys
  redis:
    host: fuzeinfra-redis
    port: 6379
    db: 0

# -----------------------------------------------------------------------------
# Application-wide (non-secret) config -> ConfigMap
# -----------------------------------------------------------------------------
config:
  logLevel: INFO
  environment: production
  # OpenAI model used by the signup-automation path (key is a secret).
  openaiModel: gpt-4
  # Browser automation defaults.
  browserHeadless: "True"
  # Public API base the SPA calls (same edge as the frontend). Note: React
  # REACT_APP_* vars are baked at BUILD time, so this runtime value is advisory
  # for the pre-built image; the real value must be baked at image build.
  apiBaseUrl: "https://api.keys.prod.fuzefront.com"

# -----------------------------------------------------------------------------
# Secrets — FUZEKEYS-OWNED credentials (NOT FuzeInfra's).
#
# In real clusters these come from a SealedSecret (secrets.existingSecret =
# fuzekeys-secrets, generated by .github/workflows/seal-secrets.yml). The values
# here are EMPTY placeholders that degrade clearly (the backend refuses to start
# without SECRET_KEY / CREDENTIAL_ENCRYPTION_KEY). NEVER commit real values.
# -----------------------------------------------------------------------------
secrets:
  # If set, the chart will NOT render its own Secret and will reference this one
  # (the SealedSecret-provided `fuzekeys-secrets`). This is the prod path.
  existingSecret: ""
  # Datastore credentials FuzeKeys uses to authenticate against FuzeInfra Postgres.
  postgresUsername: ""
  postgresPassword: ""
  redisPassword: ""
  # Application secrets (backend refuses to boot without SECRET_KEY /
  # CREDENTIAL_ENCRYPTION_KEY). CREDENTIAL_ENCRYPTION_KEY MUST be a valid Fernet
  # key (urlsafe-base64 of 32 bytes) — the backend validates it as such.
  secretKey: ""
  credentialEncryptionKey: ""
  masterKeySalt: ""
  openaiApiKey: ""

# -----------------------------------------------------------------------------
# Shared persistence for app logs/data (NOT datastores).
# Datastores live in FuzeInfra; these PVCs only hold app logs + captured data.
# -----------------------------------------------------------------------------
persistence:
  logs:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 2Gi
  data:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 5Gi

# -----------------------------------------------------------------------------
# Ingress (frontend + backend API). Behind the shared Cloudflare Tunnel; CF
# terminates TLS at the edge, so the cluster is HTTP-only — NO cert-manager, NO
# in-cluster TLS. className/hosts overridden in values-contabo.yaml.
# -----------------------------------------------------------------------------
ingress:
  enabled: true
  className: traefik
  annotations: {}
  tls:
    enabled: false
  hosts:
    - host: keys.prod.fuzefront.com
      service: frontend
      port: 80
      path: /
    - host: api.keys.prod.fuzefront.com
      service: backend
      port: 8002
      path: /

serviceAccount:
  create: true
  name: ""
  annotations: {}

# -----------------------------------------------------------------------------
# Per-component settings
# -----------------------------------------------------------------------------

# --- Backend: FastAPI (app.main:app), port 8002, /health. ------------------
backend:
  enabled: true
  image:
    repository: "" # defaults to <global.imageRepository>/backend
    tag: ""        # defaults to Chart.appVersion
  replicas: 2
  port: 8002
  # Uses the image's default CMD (uvicorn app.main:app --port 8002). Override
  # here only if you need a different entrypoint.
  command: []
  resources:
    requests: { cpu: 200m, memory: 384Mi }
    limits: { cpu: "1", memory: 768Mi }
  probes:
    path: /health
  # Prometheus scrape of the backend (see observability annotations on the pod).
  metrics:
    enabled: true
    path: /metrics

# --- Migrate: alembic upgrade head, run as a pre-sync/pre-upgrade Job. ------
migrate:
  enabled: true
  # Uses the backend image; alembic.ini lives at /app/alembic.ini in that image.
  command: ["alembic", "upgrade", "head"]
  backoffLimit: 3
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 500m, memory: 512Mi }

# --- Frontend: React SPA on nginx. Container listens 3000 (frontend/nginx.conf);
#     the Service exposes port 80 -> targetPort 3000. -------------------------
frontend:
  enabled: true
  image:
    repository: "" # defaults to <global.imageRepository>/frontend
    tag: ""
  replicas: 2
  # containerPort — MUST match the port nginx listens on in the image (3000).
  port: 3000
  # Service port the Ingress routes to ("served on :80").
  servicePort: 80
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 250m, memory: 256Mi }

# =============================================================================
# PII-TOKENIZER STACK
#
# FOLLOW-UP: enable after Vault-in-k8s design + security review.
# These components are authored in full so the chart is complete, but are gated
# OFF by default (and in values-contabo.yaml). The tokenizer stack requires a
# Vault-in-k8s auto-unseal design (Vault is sealed on every restart; the current
# init/unseal key lives in a local volume — NOT acceptable for k8s prod) plus a
# security review of the LLM data-path. Do NOT flip these on before that lands.
# Ollama stays disabled regardless (GPU/heavy).
# =============================================================================

# --- Tokenizer: FastAPI wrapper over pii_vault, port 8099, /health. ---------
tokenizer:
  enabled: false
  image:
    repository: "" # defaults to <global.imageRepository>/pii-tokenizer
    tag: ""
  replicas: 1
  port: 8099
  env:
    TOKEN_TTL: "86400"
    PII_ENTITIES: "CREDIT_CARD,US_SSN,EMAIL_ADDRESS,PHONE_NUMBER,IBAN_CODE"
    PII_SCORE_THRESHOLD: "0.4"
    MAX_TOKENIZE_CHARS: "20000"
    VAULT_TRANSIT_KEY: "pii"
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 500m, memory: 512Mi }

# --- Vault-bootstrap: one-shot Job (init once + unseal + ensure transit key). -
vaultBootstrap:
  enabled: false
  # Uses the pii-tokenizer image; command overrides the default tokenizer CMD.
  command: ["python", "service/vault_bootstrap.py"]
  env:
    VAULT_TRANSIT_KEY: "pii"
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: 250m, memory: 256Mi }

# --- Presidio analyzer: PII detection over HTTP, container port 3000. --------
presidio:
  enabled: false
  image: "mcr.microsoft.com/presidio-analyzer:latest"
  replicas: 1
  port: 3000
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: "1", memory: 1Gi }

# --- LiteLLM proxy: :4000 with the pii-tokenizer guardrail. ------------------
litellm:
  enabled: false
  image: "ghcr.io/berriai/litellm:main-stable"
  replicas: 1
  port: 4000
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 500m, memory: 512Mi }

# --- Vault: transit engine, PERSISTENT file storage. ------------------------
vault:
  enabled: false
  image: "hashicorp/vault:1.18"
  port: 8200
  # config.hcl is provided via the chart ConfigMap (see configmap.yaml).
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 1Gi
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }

# --- Ollama: local Gemma second-stage PII detector. ALWAYS off (GPU/heavy). --
ollama:
  enabled: false
  image: "ollama/ollama:latest"
  port: 11434
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 20Gi
  resources:
    requests: { cpu: 500m, memory: 2Gi }
    limits: { cpu: "2", memory: 6Gi }

# --- Redis: token store for the tokenizer stack (SEPARATE from FuzeInfra redis). -
tokenizerRedis:
  enabled: false
  image: "redis:7-alpine"
  port: 6379
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 1Gi
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 250m, memory: 256Mi }
