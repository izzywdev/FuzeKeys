{{- if .Values.ingress.enabled }}
{{/*
  Ingress behind the shared Cloudflare Tunnel. CF terminates TLS at the edge and
  Traefik is ClusterIP — so there is deliberately NO cert-manager annotation and
  NO tls: block. Do NOT add them: the cluster is HTTP-only by contract.
*/}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "fuzekeys.fullname" . }}
  labels:
    {{- include "fuzekeys.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: {{ .path | default "/" }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "fuzekeys.fullname" $ }}-{{ .service }}
                port:
                  number: {{ .port }}
    {{- end }}
{{- end }}
