{{- if not .Values.secrets.existingSecret -}}
{{/*
  Chart-managed FALLBACK Secret holding FUZEKEYS-OWNED credentials (NOT
  FuzeInfra's). Rendered ONLY when secrets.existingSecret is empty (local/dev).
  In prod, secrets.existingSecret = fuzekeys-secrets (a SealedSecret) is set, so
  this block is skipped entirely. Default values are EMPTY placeholders — the
  backend refuses to boot without SECRET_KEY / CREDENTIAL_ENCRYPTION_KEY, which
  degrades clearly rather than silently using a shared default.

  Composes the connection URLs the app expects (DATABASE_URL / DATABASE_URL_ASYNC
  / REDIS_URL) from this consumer's credentials + FuzeInfra's published host/port
  contract (fuzeinfra.* in values).
*/}}
{{- $pgHost := include "fuzekeys.fuzeHost" (dict "ctx" . "host" .Values.fuzeinfra.postgres.host) -}}
{{- $redisHost := include "fuzekeys.fuzeHost" (dict "ctx" . "host" .Values.fuzeinfra.redis.host) -}}
{{- $s := .Values.secrets -}}
{{- $pgUrl := printf "postgresql://%s:%s@%s:%v/%s" $s.postgresUsername $s.postgresPassword $pgHost .Values.fuzeinfra.postgres.port .Values.fuzeinfra.postgres.database -}}
{{- $pgUrlAsync := printf "postgresql+asyncpg://%s:%s@%s:%v/%s" $s.postgresUsername $s.postgresPassword $pgHost .Values.fuzeinfra.postgres.port .Values.fuzeinfra.postgres.database -}}
{{- $redisAuth := "" -}}
{{- if $s.redisPassword -}}{{- $redisAuth = printf ":%s@" $s.redisPassword -}}{{- end -}}
{{- $redisUrl := printf "redis://%s%s:%v/%v" $redisAuth $redisHost .Values.fuzeinfra.redis.port .Values.fuzeinfra.redis.db -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fuzekeys.fullname" . }}-secrets
  labels:
    {{- include "fuzekeys.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ $pgUrl | quote }}
  DATABASE_URL_ASYNC: {{ $pgUrlAsync | quote }}
  REDIS_URL: {{ $redisUrl | quote }}
  SECRET_KEY: {{ $s.secretKey | quote }}
  CREDENTIAL_ENCRYPTION_KEY: {{ $s.credentialEncryptionKey | quote }}
  MASTER_KEY_SALT: {{ $s.masterKeySalt | quote }}
  OPENAI_API_KEY: {{ $s.openaiApiKey | quote }}
{{- end -}}
