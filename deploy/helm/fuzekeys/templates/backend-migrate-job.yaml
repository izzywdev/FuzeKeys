{{- if and .Values.migrate.enabled .Values.backend.enabled }}
{{/*
  Alembic migration Job. Runs `alembic upgrade head` against FuzeInfra Postgres
  using the backend image (alembic.ini lives at /app/alembic.ini). Modelled as a
  Helm pre-install/pre-upgrade hook so it runs BEFORE the backend rollout — Argo
  honours Helm hooks (translated to a PreSync phase), so migrations apply before
  the new backend pods start. Idempotent: `alembic upgrade head` is a no-op when
  the DB is already at head.
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "fuzekeys.fullname" . }}-migrate
  labels:
    {{- include "fuzekeys.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrate.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "fuzekeys.labels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      {{- include "fuzekeys.nodeSelector" . | nindent 6 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "fuzekeys.image" (dict "ctx" . "comp" .Values.backend "default" "backend") }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command: {{ toJson .Values.migrate.command }}
          envFrom:
            - configMapRef:
                name: {{ include "fuzekeys.fullname" . }}-config
            - secretRef:
                name: {{ include "fuzekeys.secretName" . }}
          resources:
            {{- toYaml .Values.migrate.resources | nindent 12 }}
{{- end }}
