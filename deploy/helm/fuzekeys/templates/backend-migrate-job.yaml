{{- if and .Values.migrate.enabled .Values.backend.enabled }}
{{/*
  Alembic migration Job. Runs `alembic upgrade head` before backend pods start.
  Ordered via Argo sync-waves: ConfigMap at wave -2, this Job at wave -1,
  backend/frontend at wave 0 (default). Argo waits for each wave to reach
  Healthy before advancing, so migrations always complete before new pods roll out.
  Idempotent: `alembic upgrade head` is a no-op when the DB is already at head.
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "fuzekeys.fullname" . }}-migrate
  labels:
    {{- include "fuzekeys.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: {{ .Values.migrate.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "fuzekeys.labels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      {{- include "fuzekeys.nodeSelector" . | nindent 6 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "fuzekeys.image" (dict "ctx" . "comp" .Values.backend "default" "backend") }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command: {{ toJson .Values.migrate.command }}
          envFrom:
            - configMapRef:
                name: {{ include "fuzekeys.fullname" . }}-config
            - secretRef:
                name: {{ include "fuzekeys.secretName" . }}
          resources:
            {{- toYaml .Values.migrate.resources | nindent 12 }}
{{- end }}
