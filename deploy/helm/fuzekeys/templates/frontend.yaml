{{- if .Values.frontend.enabled }}
{{- $comp := .Values.frontend -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fuzekeys.fullname" . }}-frontend
  labels:
    {{- include "fuzekeys.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ $comp.replicas }}
  selector:
    matchLabels:
      {{- include "fuzekeys.selectorLabels" (dict "ctx" . "component" "frontend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fuzekeys.labels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      {{- include "fuzekeys.nodeSelector" . | nindent 6 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: {{ include "fuzekeys.image" (dict "ctx" . "comp" $comp "default" "frontend") }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $comp.port }}
          env:
            - name: REACT_APP_API_URL
              value: {{ .Values.config.apiBaseUrl | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml $comp.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fuzekeys.fullname" . }}-frontend
  labels:
    {{- include "fuzekeys.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    {{- include "fuzekeys.selectorLabels" (dict "ctx" . "component" "frontend") | nindent 4 }}
  ports:
    - name: http
      # Service exposes :80 ("served on :80"); container listens on {{ $comp.port }}.
      port: {{ $comp.servicePort }}
      targetPort: http
{{- end }}
