apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fuzekeys-sealed
  namespace: argocd
spec:
  # GitOps-applies the SealedSecrets in deploy/argocd/sealed/ so prod secrets are
  # reconciled by Argo (not a one-off kubectl apply) and survive a from-scratch
  # cluster rebuild. The sealed-secrets CONTROLLER that decrypts these is
  # FuzeInfra shared infra — they hold the private key; this repo commits only
  # ciphertext. The sealed/ dir starts empty (.gitkeep only); the SealedSecrets
  # are generated by .github/workflows/seal-secrets.yml.
  project: fuzekeys
  source:
    repoURL: https://github.com/izzywdev/FuzeKeys.git
    targetRevision: master
    path: deploy/argocd/sealed
  destination:
    server: https://kubernetes.default.svc
    namespace: fuzekeys
  syncPolicy:
    automated:
      prune: false # never auto-prune secrets
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
