apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: fuzekeys
  namespace: argocd
  annotations:
    fuzekeys.io/owner-repo: izzywdev/FuzeKeys
    # Created FIRST within the root app-of-apps sync so the child Applications
    # (which reference `project: fuzekeys`) never hit InvalidSpecError for a
    # missing project — the failure mode that left `fuzekeys-apps` Missing.
    argocd.argoproj.io/sync-wave: "-1"
    # NEVER auto-prune the AppProject: if this manifest transiently fails to
    # render, prune would delete the project and cascade every child app into
    # InvalidSpec. Pinned off regardless of the root app-of-apps prune policy.
    argocd.argoproj.io/sync-options: Prune=false
spec:
  description: >-
    FuzeKeys — keys / secrets / PII-tokenization product — deployed onto the
    shared FuzeInfra k3s cluster. Datastores (Postgres/Redis) are provided
    out-of-cluster by FuzeInfra and referenced via in-cluster Service DNS.

  # Only this repo may be a source for Applications in this project.
  sourceRepos:
    - https://github.com/izzywdev/FuzeKeys.git

  # The workload lands in `fuzekeys`; the app-of-apps + sealed Applications live
  # in `argocd`. FuzeKeys NEVER deploys into the shared `fuzeinfra` namespace.
  destinations:
    - namespace: fuzekeys
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: "*"
      kind: "*"

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
