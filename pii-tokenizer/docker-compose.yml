# PII-vault supporting services for the Claude tokenization pipeline.
#   redis     -> token store (token -> Vault ciphertext)
#   vault     -> transit engine, encrypts/decrypts the real PII values (PERSISTENT file storage)
#   presidio  -> PII detection over HTTP (POST /analyze)
#
# Vault uses persistent file storage (pii-vault-data volume) + vault/config.hcl, so the transit
# key and all tokens survive restarts/reboots. It must be unsealed on each start: stack-up.sh
# initializes once and auto-unseals from vault/.vault-init.json (gitignored). Run stack-up.sh
# instead of `docker compose up` directly — it brings up the stack AND unseals/bootstraps Vault.
services:
  redis:
    image: redis:7-alpine
    container_name: pii-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - pii-redis-data:/data
    restart: unless-stopped

  vault:
    image: hashicorp/vault:1.18
    container_name: pii-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
    ports:
      - "8200:8200"
    volumes:
      - ./vault/config.hcl:/vault/config/config.hcl:ro
      - pii-vault-data:/vault/file
    # The image entrypoint auto-adds `-config=/vault/config`, which loads the mounted
    # config.hcl. Do NOT also pass `-config=...` here or the file loads twice (two
    # listeners on 8200 -> "address already in use").
    command: ["server"]
    restart: unless-stopped

  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:latest
    container_name: pii-presidio
    ports:
      - "5002:3000"
    restart: unless-stopped

volumes:
  pii-redis-data:
  pii-vault-data:
