# seal-secrets — workflow_dispatch to seal every FuzeKeys application secret into
# SealedSecrets for ArgoCD to sync. Run when onboarding or rotating creds.
#
# IDEMPOTENT: a secret is only (re)sealed if its sealed file is ABSENT, so
# re-runs never churn generated keys. To rotate a value, delete its file under
# deploy/argocd/sealed/ and re-run.
#
# SIGNING-SAFE / RULESET-COMPLIANT: FuzeKeys' default branch (master) is protected
# (required PR + review, required signatures, no direct push). So this workflow
# does NOT push to master. It opens a PR via peter-evans/create-pull-request with
# sign-commits:true (commits authored through the GitHub API are auto-verified),
# which merges through the normal green gate; Argo then syncs the sealed secrets.
# NEVER weaken the ruleset to let a bot push — fix the signing path (this).
#
# The sealed-secrets CONTROLLER that decrypts these lives in FuzeInfra (shared).
# We only ever fetch its PUBLIC cert and commit ciphertext — no cluster access,
# no kubeconfig, no private key here.
#
# Required repo secrets (empty -> that field seals empty / feature inactive):
#   GHCR_PAT              — GitHub PAT (packages:read) for ghcr.io/izzywdev/fuzekeys
#   FUZEKEYS_DB_USER      — Postgres role FuzeKeys authenticates with (FuzeInfra-provisioned)
#   FUZEKEYS_DB_PASSWORD  — its password (ALPHANUMERIC only — it goes in a URL)
#   FUZEKEYS_REDIS_PASSWORD (optional)
#   OPENAI_API_KEY        (optional — signup automation)
#
# FuzeInfra shared-datastore contract (namespaced DNS) — mirrors helm values:
#   Postgres  fuzeinfra-postgres.fuzeinfra.svc.cluster.local:5432 / db fuzekeys
#   Redis     fuzeinfra-redis.fuzeinfra.svc.cluster.local:6379 / db 0

name: seal-secrets

on:
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  seal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install kubeseal + kubectl
        run: |
          VERSION=0.26.0
          curl -fsSL "https://github.com/bitnami-labs/sealed-secrets/releases/download/v${VERSION}/kubeseal-${VERSION}-linux-amd64.tar.gz" \
            | tar -xz kubeseal
          sudo install -m 755 kubeseal /usr/local/bin/kubeseal
          rm -f kubeseal
          curl -fsSL -o kubectl "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
          sudo install -m 755 kubectl /usr/local/bin/kubectl

      - name: Fetch FuzeInfra sealed-secrets public cert
        run: |
          curl -fsSL https://sealed-secrets.prod.fuzefront.com/v1/cert.pem -o /tmp/sealed-secrets-pub.pem
          echo "Fetched public cert:"
          openssl x509 -in /tmp/sealed-secrets-pub.pem -noout -subject -dates

      - name: Prepare sealed dir
        run: mkdir -p deploy/argocd/sealed

      # --- GHCR pull secret (fuzekeys namespace) --------------------------
      - name: Seal ghcr-pull-secret (fuzekeys)
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          f=deploy/argocd/sealed/ghcr-pull-secret.yaml
          if [ -f "$f" ]; then echo "$f exists — skipping."; exit 0; fi
          kubectl create secret docker-registry ghcr-pull-secret \
            -n fuzekeys \
            --docker-server=ghcr.io \
            --docker-username=izzywdev \
            --docker-password="${GHCR_PAT}" \
            --dry-run=client -o yaml \
            | kubeseal --cert /tmp/sealed-secrets-pub.pem -o yaml > "$f"
          echo "Sealed ghcr-pull-secret (fuzekeys)."

      # --- Backend app secret (fuzekeys) ----------------------------------
      # Composes the connection URLs the backend reads (envFrom fuzekeys-secrets)
      # from FuzeInfra Postgres creds + generated app keys.
      #
      # KEY GENERATION NOTE:
      #   * SECRET_KEY / MASTER_KEY_SALT -> `openssl rand -hex 32` (hex, safe
      #     everywhere).
      #   * CREDENTIAL_ENCRYPTION_KEY -> MUST be a valid Fernet key (urlsafe-base64
      #     of 32 bytes) — the backend validates it as a Fernet key and REFUSES to
      #     start if it is not. So it is NOT hex: it is `openssl rand -base64 32`
      #     transformed to the urlsafe alphabet. A hex key would break the backend.
      - name: Seal fuzekeys-secrets (fuzekeys)
        env:
          FUZEKEYS_DB_USER: ${{ secrets.FUZEKEYS_DB_USER }}
          FUZEKEYS_DB_PASSWORD: ${{ secrets.FUZEKEYS_DB_PASSWORD }}
          FUZEKEYS_REDIS_PASSWORD: ${{ secrets.FUZEKEYS_REDIS_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          f=deploy/argocd/sealed/fuzekeys-secrets.yaml
          if [ -f "$f" ]; then echo "$f exists — skipping. Delete + re-run to rotate."; exit 0; fi
          PG_HOST="fuzeinfra-postgres.fuzeinfra.svc.cluster.local"; PG_PORT=5432; PG_DB="fuzekeys"
          RS_HOST="fuzeinfra-redis.fuzeinfra.svc.cluster.local";   RS_PORT=6379; RS_DB=0
          DATABASE_URL="postgresql://${FUZEKEYS_DB_USER}:${FUZEKEYS_DB_PASSWORD}@${PG_HOST}:${PG_PORT}/${PG_DB}"
          DATABASE_URL_ASYNC="postgresql+asyncpg://${FUZEKEYS_DB_USER}:${FUZEKEYS_DB_PASSWORD}@${PG_HOST}:${PG_PORT}/${PG_DB}"
          if [ -n "${FUZEKEYS_REDIS_PASSWORD}" ]; then
            REDIS_URL="redis://:${FUZEKEYS_REDIS_PASSWORD}@${RS_HOST}:${RS_PORT}/${RS_DB}"
          else
            REDIS_URL="redis://${RS_HOST}:${RS_PORT}/${RS_DB}"
          fi
          SECRET_KEY="$(openssl rand -hex 32)"
          MASTER_KEY_SALT="$(openssl rand -hex 32)"
          # Valid Fernet key (urlsafe-base64 of 32 random bytes) — NOT hex.
          CREDENTIAL_ENCRYPTION_KEY="$(openssl rand -base64 32 | tr '+/' '-_')"
          kubectl create secret generic fuzekeys-secrets \
            -n fuzekeys \
            --from-literal=DATABASE_URL="$DATABASE_URL" \
            --from-literal=DATABASE_URL_ASYNC="$DATABASE_URL_ASYNC" \
            --from-literal=REDIS_URL="$REDIS_URL" \
            --from-literal=SECRET_KEY="$SECRET_KEY" \
            --from-literal=MASTER_KEY_SALT="$MASTER_KEY_SALT" \
            --from-literal=CREDENTIAL_ENCRYPTION_KEY="$CREDENTIAL_ENCRYPTION_KEY" \
            --from-literal=OPENAI_API_KEY="${OPENAI_API_KEY}" \
            --dry-run=client -o yaml \
            | kubeseal --cert /tmp/sealed-secrets-pub.pem -o yaml > "$f"
          echo "Sealed fuzekeys-secrets (composed URLs + generated app keys)."

      # --- Tokenizer stack secret (fuzekeys) ------------------------------
      # Scaffolding for the pii-tokenizer stack (currently gated OFF in the chart).
      # LITELLM_MASTER_KEY is generated; the tokenizer pods reference this Secret
      # via an OPTIONAL secretRef, so it is harmless while the stack is disabled.
      - name: Seal fuzekeys-tokenizer-secrets (fuzekeys)
        run: |
          f=deploy/argocd/sealed/fuzekeys-tokenizer-secrets.yaml
          if [ -f "$f" ]; then echo "$f exists — skipping (generated once)."; exit 0; fi
          LITELLM_MASTER_KEY="sk-$(openssl rand -hex 24)"
          kubectl create secret generic fuzekeys-tokenizer-secrets \
            -n fuzekeys \
            --from-literal=LITELLM_MASTER_KEY="$LITELLM_MASTER_KEY" \
            --dry-run=client -o yaml \
            | kubeseal --cert /tmp/sealed-secrets-pub.pem -o yaml > "$f"
          echo "Sealed fuzekeys-tokenizer-secrets (generated LiteLLM master key)."

      # --- Open a PR (signing-safe; NEVER pushes to the protected master) --
      - name: Open PR with sealed secrets
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: master
          branch: chore/seal-secrets
          sign-commits: true
          commit-message: "chore(secrets): seal application secrets (automated)"
          title: "chore(secrets): seal application secrets"
          body: |
            Automated SealedSecrets for the `fuzekeys` namespace (generated by
            `.github/workflows/seal-secrets.yml`). Only ciphertext is committed;
            the sealed-secrets controller in FuzeInfra decrypts in-cluster.

            Merge through the normal green gate — Argo then syncs
            `deploy/argocd/sealed/` into the cluster.
          add-paths: deploy/argocd/sealed/
