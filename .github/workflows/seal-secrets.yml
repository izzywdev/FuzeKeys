name: Seal Secrets

# Re-seals fuzekeys-secrets from GH Actions secrets and commits the
# SealedSecret to deploy/argocd/sealed/. Run after rotating credentials.
# Requires: KUBECONFIG_CONTABO (base64 kubeconfig with sealed-secrets read access).

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  seal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeseal
        run: |
          KSV=0.27.3
          curl -fsSL -o /tmp/kubeseal.tar.gz \
            "https://github.com/bitnami-labs/sealed-secrets/releases/download/v${KSV}/kubeseal-${KSV}-linux-amd64.tar.gz"
          tar -xzf /tmp/kubeseal.tar.gz -C /tmp kubeseal
          sudo install -m 0755 /tmp/kubeseal /usr/local/bin/kubeseal

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTABO }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Build and seal Secret
        env:
          DATABASE_URL:             ${{ secrets.FUZEKEYS_DATABASE_URL }}
          DATABASE_URL_ASYNC:       ${{ secrets.FUZEKEYS_DATABASE_URL_ASYNC }}
          REDIS_URL:                ${{ secrets.FUZEKEYS_REDIS_URL }}
          SECRET_KEY:               ${{ secrets.SECRET_KEY }}
          CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}
          MASTER_KEY_SALT:          ${{ secrets.MASTER_KEY_SALT }}
        run: |
          kubectl create secret generic fuzekeys-secrets \
            --namespace fuzekeys \
            --from-literal=DATABASE_URL="$DATABASE_URL" \
            --from-literal=DATABASE_URL_ASYNC="$DATABASE_URL_ASYNC" \
            --from-literal=REDIS_URL="$REDIS_URL" \
            --from-literal=SECRET_KEY="$SECRET_KEY" \
            --from-literal=CREDENTIAL_ENCRYPTION_KEY="$CREDENTIAL_ENCRYPTION_KEY" \
            --from-literal=MASTER_KEY_SALT="$MASTER_KEY_SALT" \
            --dry-run=client -o yaml \
          | kubeseal --format yaml \
              --controller-namespace kube-system \
              --controller-name sealed-secrets-controller \
          > deploy/argocd/sealed/fuzekeys-secrets.yaml

      - name: Commit SealedSecret
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/argocd/sealed/fuzekeys-secrets.yaml
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore(secrets): re-seal fuzekeys-secrets [skip ci]"
          git push
