name: Build and Push Images

# Builds backend + frontend Docker images and pushes to GHCR.
# Tags: git SHA (immutable) + `latest` on master.
# Triggered on every push to master that touches app source, or manually.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag override (defaults to git SHA)"
        required: false
  push:
    branches: [master]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/build-and-push.yml"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/izzywdev/fuzekeys

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component:
          - name: backend
            context: backend
            dockerfile: backend/Dockerfile
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_SHA::8}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.IMAGE_BASE }}/${{ matrix.component.name }}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.component.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.component.context }}
          file: ${{ matrix.component.dockerfile }}
          push: true
          tags: |
            ${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}
            ${{ steps.tag.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bump-chart-version:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump appVersion in Chart.yaml
        run: |
          SHA="${GITHUB_SHA::8}"
          sed -i "s/^appVersion:.*/appVersion: \"$SHA\"/" deploy/helm/fuzekeys/Chart.yaml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/helm/fuzekeys/Chart.yaml
          git diff --cached --quiet && exit 0
          git commit -m "chore(chart): bump appVersion to $SHA [skip ci]"
          git push
