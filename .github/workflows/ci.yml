name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11]
        node-version: [18.x, 20.x]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: fuzekeys_test
          POSTGRES_USER: fuzekeys_user
          POSTGRES_PASSWORD: fuzekeys_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/pip
          backend/.venv
        key: ${{ runner.os }}-python-${{ matrix.python-version }}-${{ hashFiles('backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-python-${{ matrix.python-version }}-

    - name: Install Python dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov flake8 black isort mypy

    - name: Install Node.js dependencies
      run: |
        cd frontend
        npm ci

    - name: Python Code Formatting Check (Black)
      run: |
        cd backend
        black --check --diff .

    - name: Python Import Sorting Check (isort)
      run: |
        cd backend
        isort --check-only --diff .

    - name: Python Linting (Flake8)
      run: |
        cd backend
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Python Type Checking (MyPy)
      run: |
        cd backend
        mypy app --ignore-missing-imports

    - name: Frontend Linting (ESLint)
      run: |
        cd frontend
        npm run lint

    - name: Frontend Type Checking
      run: |
        cd frontend
        npm run type-check

    - name: Frontend Build
      run: |
        cd frontend
        npm run build

    - name: Set up test environment
      env:
        DATABASE_URL: postgresql://fuzekeys_user:fuzekeys_password@localhost:5432/fuzekeys_test
        DATABASE_URL_ASYNC: postgresql+asyncpg://fuzekeys_user:fuzekeys_password@localhost:5432/fuzekeys_test
        REDIS_URL: redis://localhost:6379
        SECRET_KEY: test-secret-key-for-ci
        MASTER_KEY_SALT: test-salt-for-ci
      run: |
        cd backend
        # Run database migrations
        python -c "import asyncio; from app.database import init_database; asyncio.run(init_database())"

    - name: Run Python Tests
      env:
        DATABASE_URL: postgresql://fuzekeys_user:fuzekeys_password@localhost:5432/fuzekeys_test
        DATABASE_URL_ASYNC: postgresql+asyncpg://fuzekeys_user:fuzekeys_password@localhost:5432/fuzekeys_test
        REDIS_URL: redis://localhost:6379
        SECRET_KEY: test-secret-key-for-ci
        MASTER_KEY_SALT: test-salt-for-ci
        PYTHONPATH: .
      run: |
        cd backend
        pytest tests/ -v --cov=app --cov-report=xml --cov-report=html

    - name: Run Frontend Tests
      run: |
        cd frontend
        npm test -- --coverage --watchAll=false

    - name: Upload Python Coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: backend/coverage.xml
        flags: backend
        name: backend-coverage

    - name: Upload Frontend Coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: frontend/coverage/lcov.info
        flags: frontend
        name: frontend-coverage

  security-scan:
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install security scanning tools
      run: |
        pip install bandit safety

    - name: Run Python Security Scan (Bandit)
      run: |
        cd backend
        bandit -r app/ -f json -o bandit-report.json || true
        bandit -r app/

    - name: Run Python Dependency Security Scan (Safety)
      run: |
        cd backend
        safety check --json --output safety-report.json || true
        safety check

    - name: Run Node.js Security Audit
      run: |
        cd frontend
        npm audit --audit-level=moderate

  permit-io-scraper-test:
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install Playwright
      run: |
        cd scrapers/permit_io
        pip install -r requirements.txt
        playwright install

    - name: Test Permit.io Scraper (Dry Run)
      run: |
        cd scrapers/permit_io
        python -c "
        import asyncio
        from scraper import UserCredentials, PermitIOScraper
        
        async def dry_run_test():
            print('Testing scraper initialization...')
            async with PermitIOScraper(headless=True) as scraper:
                print('Scraper initialized successfully')
                # Test form field detection without actual submission
                print('Dry run test completed')
        
        asyncio.run(dry_run_test())
        "

  build-status:
    runs-on: ubuntu-latest
    needs: [lint-and-test, security-scan, permit-io-scraper-test]
    if: always()
    
    steps:
    - name: Check build status
      run: |
        if [[ "${{ needs.lint-and-test.result }}" == "success" && 
              "${{ needs.security-scan.result }}" == "success" && 
              "${{ needs.permit-io-scraper-test.result }}" == "success" ]]; then
          echo "✅ All checks passed!"
          exit 0
        else
          echo "❌ Some checks failed!"
          exit 1
        fi 